<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弁理士試験 詰将棋トレーナー (Level 1.8 - 2軸システムアーキテクチャ版)</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2a2a2a;
            --text-color: #e0e0e0;
            --text-muted: #666666;
            --accent-color: #00ADB5;
            --correct-color: #ffffff;
            --wrong-color: #ff4d4d;
            --choice-bg: #333333;
            --choice-hover: #444444;
            --voice-bg: #1e3a3a;
            --voice-border: #00ADB5;
            --hint-bg: #222222;

            /* 軸①：行為主体カラー定義 */
            --color-applicant: #2b5c8f;   /* 青 */
            --color-system: #4a4a4a;      /* 灰 */
            --color-examiner: #dcdcdc;    /* 白 */
            --color-court: #111111;       /* 黒 */
            --color-competitor: #8b2626;  /* 赤 */
            --color-environment: #2e5c2e; /* 緑 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左側：コントロール＆ミニマップ */
        #sidebar {
            width: 350px;
            background-color: var(--panel-bg);
            border-right: 1px solid #3d3d3d;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        h2 {
            font-size: 1.1rem;
            margin-top: 0;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        #chapter-controls, #importance-controls, #voice-controls {
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .control-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .control-toggle input {
            margin-right: 10px;
        }

        #minimap-container {
            flex-grow: 1;
            margin-top: 5px;
            padding-right: 5px;
        }

        .minimap-chapter {
            margin-bottom: 15px;
        }

        .minimap-chapter-title {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .minimap-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }

        .minimap-item {
            font-size: 0.7rem;
            background: #222;
            padding: 4px 2px;
            text-align: center;
            border-radius: 3px;
            color: var(--text-muted);
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }

        /* 軸①のカラー反映（アクティブ時） */
        .minimap-item.active.actor-applicant { background-color: var(--color-applicant); color: #fff; }
        .minimap-item.active.actor-system { background-color: var(--color-system); color: #ccc; }
        .minimap-item.active.actor-examiner { background-color: var(--color-examiner); color: #000; font-weight: bold; }
        .minimap-item.active.actor-court { background-color: var(--color-court); color: #fff; border-color: #444; }
        .minimap-item.active.actor-competitor { background-color: var(--color-competitor); color: #fff; }
        .minimap-item.active.actor-environment { background-color: var(--color-environment); color: #fff; }

        .minimap-item.correct {
            background-color: #fff !important;
            color: #000 !important;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            border-color: var(--accent-color) !important;
        }

        /* 右側：クイズエリア */
        #main-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-y: auto;
        }

        #quiz-box {
            max-width: 650px;
            width: 100%;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
            box-sizing: border-box;
        }

        /* 新設：2軸システムアーキテクチャハブ */
        #architecture-hub {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            display: none;
        }

        .arch-badge {
            font-size: 0.8rem;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-role {
            background-color: #111;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            font-family: 'Courier New', Courier, monospace;
        }

        /* フレーバーテキスト（セリフ） */
        #voice-bubble {
            background-color: var(--voice-bg);
            border-left: 4px solid var(--voice-border);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: left;
            display: none;
        }

        #voice-char-name {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 4px;
        }

        #voice-char-line {
            font-size: 0.95rem;
            font-style: italic;
            color: #fff;
            line-height: 1.4;
        }

        #question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: left;
        }

        #choices-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
        }

        .choice-btn {
            background-color: var(--choice-bg);
            border: 2px solid #444;
            color: #fff;
            font-size: 1.1rem;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .choice-btn:hover {
            background-color: var(--choice-hover);
            border-color: #555;
        }

        .choice-btn.correct {
            background-color: transparent !important;
            border-color: var(--correct-color) !important;
            color: var(--correct-color) !important;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .choice-btn.wrong {
            background-color: transparent !important;
            border-color: var(--wrong-color) !important;
            color: var(--wrong-color) !important;
            opacity: 0.5;
        }

        .wrong-shake {
            animation: shake 0.2s ease-in-out 2;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #toast {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00ADB5, #00777a);
            color: #fff;
            padding: 15px 30px;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,173,181,0.4);
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #3d3d3d; }
            #main-panel { padding: 20px 10px; }
            #choices-area { grid-template-columns: 1fr; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #222; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
    <script src="patent_data.js"></script>
</head>
<body>

    <div id="sidebar">
        <h2>章 選択</h2>
        <div id="chapter-controls"></div>
        
        <h2>頻出度 選択</h2>
        <div id="importance-controls">
            <label class="control-toggle"><input type="checkbox" checked value="3"> ★★★ （超重要アンカー）</label>
            <label class="control-toggle"><input type="checkbox" checked value="2"> ★★ （標準条文）</label>
            <label class="control-toggle"><input type="checkbox" checked value="1"> ★ （その他・条文のみ）</label>
        </div>

        <h2>表示設定</h2>
        <div id="voice-controls">
            <label class="control-toggle"><input type="checkbox" id="hint-toggle" checked> ⚙️ プログラミング2軸ヒントを表示</label>
            <label class="control-toggle"><input type="checkbox" id="voice-toggle" checked> 💡 キャラクターボイスを表示</label>
        </div>
        
        <h2 style="margin-top: 10px;">条文ミニマップ</h2>
        <div id="minimap-container"></div>
    </div>

    <div id="main-panel">
        <div id="toast">🎉 章 条件クリア！</div>
        
        <div id="quiz-box">
            <div id="architecture-hub">
                <div id="badge-actor" class="arch-badge">行為主体</div>
                <div id="badge-role" class="arch-badge badge-role">ROLE</div>
            </div>

            <div id="voice-bubble">
                <div id="voice-char-name">キャラクター名</div>
                <div id="voice-char-line">「セリフ」</div>
            </div>

            <div id="question-text">章または頻出度を選択してください。</div>
            <div id="choices-area" style="display: none;">
                <button class="choice-btn" data-index="0">--</button>
                <button class="choice-btn" data-index="1">--</button>
                <button class="choice-btn" data-index="2">--</button>
                <button class="choice-btn" data-index="3">--</button>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.08);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(140, now);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'complete') {
                const notes = [523.25, 587.33, 659.25, 783.99];
                notes.forEach((freq, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination); o.type = 'triangle'; o.frequency.value = freq;
                    g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.12, now + i * 0.08 + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    o.start(now + i * 0.08); o.stop(now + 0.5);
                });
            }
        }

        function formatArticleName(artStr) {
            const str = String(artStr);
            if (str.includes('_')) {
                const parts = str.split('_');
                return `${parts[0]}条の${parts[1]}`;
            }
            return `${str}条`;
        }

        // 軸①に対応するCSSクラスマッピング
        function getActorClass(actorStr) {
            if (!actorStr) return '';
            if (actorStr.includes('出願人')) return 'actor-applicant';
            if (actorStr.includes('システム')) return 'actor-system';
            if (actorStr.includes('審査官')) return 'actor-examiner';
            if (actorStr.includes('裁判所')) return 'actor-court';
            if (actorStr.includes('第三者')) return 'actor-competitor';
            if (actorStr.includes('環境')) return 'actor-environment';
            return '';
        }

        // 軸①に対応するバッジカラー背景設定
        function setActorBadgeStyle(el, actorStr) {
            if (!actorStr) return;
            el.innerText = actorStr;
            if (actorStr.includes('出願人')) { el.style.backgroundColor = 'var(--color-applicant)'; el.style.color = '#fff'; }
            else if (actorStr.includes('システム')) { el.style.backgroundColor = 'var(--color-system)'; el.style.color = '#ccc'; }
            else if (actorStr.includes('審査官')) { el.style.backgroundColor = 'var(--color-examiner)'; el.style.color = '#000'; }
            else if (actorStr.includes('裁判所')) { el.style.backgroundColor = 'var(--color-court)'; el.style.color = '#fff'; }
            else if (actorStr.includes('第三者')) { el.style.backgroundColor = 'var(--color-competitor)'; el.style.color = '#fff'; }
            else if (actorStr.includes('環境')) { el.style.backgroundColor = 'var(--color-environment)'; el.style.color = '#fff'; }
        }

        let activeChapters = new Set([]);
        let activeImportances = new Set([1, 2, 3]);
        let correctArticles = new Set();
        let currentQuestion = null;
        let questionQueue = [];
        let wrongAttempted = false;
        let showVoice = true;
        let showHint = true; // 2軸ヒント表示フラグ

        const chapterControls = document.getElementById('chapter-controls');
        const importanceControls = document.getElementById('importance-controls');
        const voiceToggle = document.getElementById('voice-toggle');
        const hintToggle = document.getElementById('hint-toggle');
        const minimapContainer = document.getElementById('minimap-container');
        const questionText = document.getElementById('question-text');
        const choicesArea = document.getElementById('choices-area');
        const choiceBtns = document.querySelectorAll('.choice-btn');
        const toast = document.getElementById('toast');
        
        const architectureHub = document.getElementById('architecture-hub');
        const badgeActor = document.getElementById('badge-actor');
        const badgeRole = document.getElementById('badge-role');

        const voiceBubble = document.getElementById('voice-bubble');
        const voiceCharName = document.getElementById('voice-char-name');
        const voiceCharLine = document.getElementById('voice-char-line');

        function initGame() {
            if (typeof patentLawData === 'undefined' || !Array.isArray(patentLawData)) {
                questionText.innerText = "エラー: patent_data.js が見つかりません。";
                return;
            }

            renderControls();
            renderMinimap();
            generateQueue();
            nextQuestion();

            choiceBtns.forEach(btn => {
                btn.addEventListener('click', () => checkAnswer(btn));
            });

            importanceControls.querySelectorAll('input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const val = parseInt(e.target.value);
                    if (e.target.checked) activeImportances.add(val);
                    else activeImportances.delete(val);
                    renderMinimap(); generateQueue(); nextQuestion();
                });
            });

            voiceToggle.addEventListener('change', (e) => {
                showVoice = e.target.checked;
                updateDisplayPanels();
            });

            hintToggle.addEventListener('change', (e) => {
                showHint = e.target.checked;
                updateDisplayPanels();
            });
        }

        function renderControls() {
            const chapters = [...new Set(patentLawData.map(d => d.chapter))].sort((a,b) => a-b);
            chapterControls.innerHTML = '';
            chapters.forEach(ch => {
                const data = patentLawData.find(d => d.chapter === ch);
                const label = document.createElement('label');
                label.className = 'control-toggle';
                label.innerHTML = `<input type="checkbox" value="${ch}"> ${data.chapterName}`;
                label.querySelector('input').addEventListener('change', (e) => {
                    if (e.target.checked) activeChapters.add(ch);
                    else activeChapters.delete(ch);
                    renderMinimap(); generateQueue(); nextQuestion();
                });
                chapterControls.appendChild(label);
            });
        }

        function renderMinimap() {
            minimapContainer.innerHTML = '';
            const chapters = [...new Set(patentLawData.map(d => d.chapter))].sort((a,b) => a-b);
            chapters.forEach(ch => {
                const chData = patentLawData.filter(d => d.chapter === ch);
                const chBox = document.createElement('div');
                chBox.className = 'minimap-chapter';
                chBox.appendChild(Object.assign(document.createElement('div'), {className: 'minimap-chapter-title', innerText: chData[0].chapterName}));
                const list = document.createElement('div');
                list.className = 'minimap-list';
                
                chData.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'minimap-item';
                    el.id = `map-art-${item.article}`;
                    el.innerText = formatArticleName(item.article);
                    el.title = `${formatArticleName(item.article)} [${item.axis1_actor || '未定義'}] [${item.axis2_role || '未定義'}]`;
                    
                    // 軸①(主体)に基づいたクラスを付与
                    if (item.axis1_actor) {
                        el.classList.add(getActorClass(item.axis1_actor));
                    }

                    if (activeChapters.has(ch) && activeImportances.has(item.importance)) {
                        el.classList.add('active');
                    }
                    if (correctArticles.has(item.article)) el.classList.add('correct');
                    list.appendChild(el);
                });
                list.style.display = list.childElementCount > 0 ? 'grid' : 'none';
                chBox.appendChild(list);
                minimapContainer.appendChild(chBox);
            });
        }

        function generateQueue() {
            const availableData = patentLawData.filter(d => 
                activeChapters.has(d.chapter) && 
                activeImportances.has(d.importance) && 
                !correctArticles.has(d.article)
            );
            
            for (let i = availableData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableData[i], availableData[j]] = [availableData[j], availableData[i]];
            }
            questionQueue = availableData;
        }

        function nextQuestion() {
            wrongAttempted = false;
            choiceBtns.forEach(btn => { btn.className = 'choice-btn'; btn.disabled = false; });

            if (activeChapters.size === 0) {
                questionText.innerText = "まずは左側の「章 選択」から、勉強したい章にチェックを入れてください。";
                choicesArea.style.display = 'none';
                voiceBubble.style.display = 'none';
                architectureHub.style.display = 'none';
                currentQuestion = null;
                return;
            }

            if (questionQueue.length === 0) {
                generateQueue();
                if (questionQueue.length === 0) {
                    questionText.innerText = "選択された条件（章・頻出度）の全問題をクリアしました！他の章や頻出度をONにしてください。";
                    choicesArea.style.display = 'none';
                    voiceBubble.style.display = 'none';
                    architectureHub.style.display = 'none';
                    currentQuestion = null;
                    return;
                }
            }
            choicesArea.style.display = 'grid';
            currentQuestion = questionQueue.shift();
            questionText.innerText = currentQuestion.summary;
            
            updateDisplayPanels();
            renderChoices();
        }

        // 2軸ヒントとMTGフレーバーテキストの同時管理アップデート
        function updateDisplayPanels() {
            if (!currentQuestion) return;

            // ① 2軸ヒントの表示制御
            if (showHint && (currentQuestion.axis1_actor || currentQuestion.axis2_role)) {
                setActorBadgeStyle(badgeActor, currentQuestion.axis1_actor || '未定義');
                badgeRole.innerText = currentQuestion.axis2_role ? `code: ${currentQuestion.axis2_role}` : '未定義';
                architectureHub.style.display = 'flex';
            } else {
                architectureHub.style.display = 'none';
            }

            // ② フレーバーテキスト（セリフ）の表示制御
            if (showVoice && currentQuestion.charName && currentQuestion.charLine) {
                voiceCharName.innerText = `📍 ${currentQuestion.address || '住所未特定'} ： ${currentQuestion.charName}`;
                voiceCharLine.innerText = currentQuestion.charLine;
                voiceBubble.style.display = 'block';
            } else {
                voiceBubble.style.display = 'none';
            }
        }

        function renderChoices() {
            const correctArt = currentQuestion.article;
            let dummies = patentLawData.filter(d => d.article !== correctArt).map(d => d.article);
            dummies = [...new Set(dummies)];
            
            for (let i = dummies.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [dummies[i], dummies[j]] = [dummies[j], dummies[i]];
            }
            const chosenDummies = dummies.slice(0, 3);
            let finalChoices = [correctArt, ...chosenDummies];
            for (let i = finalChoices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [finalChoices[i], finalChoices[j]] = [finalChoices[j], finalChoices[i]];
            }

            choiceBtns.forEach((btn, index) => {
                btn.innerText = formatArticleName(finalChoices[index]);
                btn.dataset.article = finalChoices[index];
            });
        }

        function checkAnswer(selectedBtn) {
            if (!currentQuestion) return;
            const selectedArt = selectedBtn.dataset.article;
            const correctArt = currentQuestion.article;
            
            if (selectedArt === correctArt) {
                selectedBtn.classList.add('correct');
                playSound('correct');
                
                if (!wrongAttempted) {
                    correctArticles.add(currentQuestion.article);
                    const mapItem = document.getElementById(`map-art-${currentQuestion.article}`);
                    if (mapItem) mapItem.classList.add('correct');
                    checkChapterCompletion(currentQuestion.chapter, currentQuestion.chapterName);
                } else {
                    questionQueue.push(currentQuestion);
                }
                setTimeout(nextQuestion, 300);
            } else {
                wrongAttempted = true;
                selectedBtn.classList.add('wrong', 'wrong-shake');
                selectedBtn.disabled = true;
                playSound('wrong');
                setTimeout(() => selectedBtn.classList.remove('wrong-shake'), 400);
            }
        }

        function checkChapterCompletion(chapterId, chapterName) {
            const chArticles = patentLawData.filter(d => d.chapter === chapterId && activeImportances.has(d.importance)).map(d => d.article);
            if (chArticles.length === 0) return;
            
            const isComp = chArticles.every(art => correctArticles.has(art));
            if (isComp) {
                playSound('complete');
                toast.innerText = `🎉 ${chapterName} 条件クリア！`;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }
        }

        window.onload = initGame;
    </script>
</body>
</html>
